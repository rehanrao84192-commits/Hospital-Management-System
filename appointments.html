<h1>📋 Appointments List</h1>

<a href="/">🏠 Home</a>

<table border="1">
<tr>
    <th>ID</th>
    <th>Patient</th>
    <th>Doctor</th>
    <th>Date</th>
    <th>Time</th>
</tr>

{% for a in appointments %}
<tr>
    <td>{{a[0]}}</td>
    <td>{{a[1]}}</td>
    <td>{{a[2]}}</td>
    <td>{{a[3]}}</td>
    <td>{{a[4]}}</td>
</tr>
{% endfor %}
</table>
